# Flatline starter config
#
# This mirrors the generated default config written to:
#
#   ~/.config/flatline/config.toml
#
# API keys can live in this file, but environment variables are safer:
#
#   OPENROUTER_API_KEY=...
#   DEEPSEEK_API_KEY=...
#   OPENAI_API_KEY=...
#   EXA_API_KEY=...
#
# ChatGPT/Codex OAuth uses:
#
#   flatline auth login openai-codex

heavyProfile = "opus"
lightProfile = "sonnet"
utilityProfile = "kimi"
compactRatio = 0.8

[profile.opus]
provider = "openrouter"
model = "anthropic/claude-opus-4.6"
promptThinking = true
providerOrder = ["Anthropic"]
contextWindow = 250000

[profile.sonnet]
provider = "openrouter"
model = "anthropic/claude-sonnet-4.6"
promptThinking = true
providerOrder = ["Anthropic"]
contextWindow = 250000

[profile.kimi]
provider = "openrouter"
model = "moonshotai/kimi-k2.6"
contextWindow = 256000

[profile.deepseekPro]
provider = "deepseek"
model = "deepseek-v4-pro"
contextWindow = 128000
reasoning = { effort = "max" }

[profile.deepseekFlash]
provider = "deepseek"
model = "deepseek-v4-flash"
contextWindow = 128000
reasoning = { effort = "high" }

[profile.deepseekUtility]
provider = "deepseek"
model = "deepseek-v4-flash"
contextWindow = 128000
reasoning = { effort = "disabled" }

[profile.openaiCodex]
provider = "openai-codex"
model = "gpt-5.3-codex"
contextWindow = 272000
reasoning = { effort = "high", summary = "auto" }

[profile.openaiCodexFrontier]
provider = "openai-codex"
model = "gpt-5.5"
contextWindow = 272000
reasoning = { effort = "medium", summary = "auto" }

[profile.openaiCodexMini]
provider = "openai-codex"
model = "gpt-5.4-mini"
contextWindow = 272000
reasoning = { effort = "medium", summary = "auto" }

[profile.openaiGpt54]
provider = "openai"
model = "gpt-5.4"
contextWindow = 1050000
reasoning = { effort = "high" }

[profile.openaiGpt55]
provider = "openai"
model = "gpt-5.5"
contextWindow = 1050000
reasoning = { effort = "high" }

# Optional web tools.
# [web]
# searchKey = "..."

# Optional session budget warning.
# [budget]
# sessionLimit = 5.00
